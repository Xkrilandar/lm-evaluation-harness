task: medxpertqa_g_no_cot
dataset_path: TsinghuaC3I/MedXpertQA
dataset_name: Text
output_type: generate_until
training_split: dev
validation_split: test
test_split: test
doc_to_text: "Question: {{question}} (A) {{options['A']}} (B) {{options['B']}} (C) {{options['C']}} (D) {{options['D']}} (E) {{options['E']}} (F) {{options['F']}} (G) {{options['G']}} (H) {{options['H']}} (I) {{options['I']}} (J) {{options['J']}}\n Response (end with 'Final Answer:' followed by *only* the letter corresponding to the correct answer enclosed in parentheses)"
doc_to_target: "{{label}}"
generation_kwargs:
  until:
    - "</s>"
    - "Q:"
    - "<|im_end|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  top_p: 1.0
filter_list:
  - name: strict-final-answer
    filter:
      - function: regex
        regex_pattern: '(?i)Answer[^A-J]*(?::)*[^A-J]*(?:boxed)*[^A-J]*([A-J])\b'
      - function: "take_first"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
