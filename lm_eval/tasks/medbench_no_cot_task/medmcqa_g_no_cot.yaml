task: medmcqa_g_no_cot
dataset_path: openlifescienceai/medmcqa

output_type: generate_until
training_split: train
validation_split: validation
test_split: validation
doc_to_text: "Question: {{question}}\n (A) {{opa}} (B) {{opb}} (C) {{opc}} (D) {{opd}}\n Response (end with 'Final Answer:' followed by *only* the letter corresponding to the correct answer enclosed in parentheses)"
doc_to_target: "{{['A', 'B', 'C', 'D'][cop]}}"
generation_kwargs:
  until:
    - "</s>"
    - "Q:"
    - "<|im_end|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  
filter_list:
  - name: strict-final-answer
    filter:
      - function: regex
        regex_pattern: '(?i)Answer[^A-D]*(?::)*[^A-D]*(?:boxed)*[^A-D]*([A-D])\b'
      - function: "take_first"

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
