task: pubmedqa_g_no_cot
dataset_path: bigbio/pubmed_qa
dataset_name: pubmed_qa_labeled_fold0_source
output_type: generate_until
training_split: train
validation_split: validation
test_split: test
doc_to_text: "Question: {{CONTEXTS}} {{QUESTION.strip()}} (A) Yes (B) No (C) Maybe \n Response (end with 'Final Answer:' followed by *only* the letter corresponding to the correct answer enclosed in parentheses)"
doc_to_target: '{{ {"yes":"A","no":"B","maybe":"C"}[final_decision] }}'
generation_kwargs:
  until:
    - "</s>"
    - "Q:"
    - "<|im_end|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  
filter_list:
  - name: strict-final-answer
    filter:
      - function: regex
        regex_pattern: '(?i)Answer[^A-D]*(?::)*[^A-D]*(?:boxed)*[^A-D]*([A-D])\b'
      - function: "take_first"

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
