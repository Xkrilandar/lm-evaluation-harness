task: medxpertqa_g
dataset_path: TsinghuaC3I/MedXpertQA
output_type: generate_until
dataset_name: Text
training_split: dev
validation_split: test
test_split: test
doc_to_text: "Instructions: The following are multiple choice questions about medical knowledge. Solve them in a step-by-step fashion, starting by summarizing the available information. Output a single option from the ten options as the final answer.\n\n Question: {{question}} (A) {{options['A']}} (B) {{options['B']}} (C) {{options['C']}} (D) {{options['D']}} (E) {{options['E']}} (F) {{options['F']}} (G) {{options['G']}} (H) {{options['H']}} (I) {{options['I']}} (J) {{options['J']}}\n Response (think step by step and then end with 'Final Answer:' followed by *only* the letter corresponding to the correct answer enclosed in parentheses)"
doc_to_target: "{{label}}"
generation_kwargs:
  until:
    - "</s>"
    - "Q:"
    - "<|im_end|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  top_p: 1.0
filter_list:
  - name: strict-final-answer
    filter:
      - function: regex
        regex_pattern: '(?i)Answer[^A-J]*(?::)*[^A-J]*(?:boxed)*[^A-J]*([A-J])\b'
      - function: "take_first"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
