task: medmcqa_g
dataset_path: openlifescienceai/medmcqa
output_type: generate_until
training_split: train
validation_split: validation
test_split: validation
# doc_to_text: !function utils_medmcqa.doc_to_text
doc_to_text: "Instructions: The following are multiple choice questions about medical knowledge. Solve them in a step-by-step fashion, starting by summarizing the available information. Output a single option from the four options as the final answer.\n\n Question: {{question}}\n (A) {{opa}} (B) {{opb}} (C) {{opc}} (D) {{opd}}\n Response (think step by step and then end with 'Final Answer:' followed by *only* the letter corresponding to the correct answer enclosed in parentheses)"
#doc_to_text: "Q: {{question}}\n (A) {{opa}} (B) {{opb}} (C) {{opc}} (D) {{opd}}\nA: Provide the final answer enclosed in boxed{the_answer}."
doc_to_target: "{{['A', 'B', 'C', 'D'][cop]}}"
# doc_to_choice: [ 'A','B','C','D' ]
filter_list:
  - name: strict-final-answer
    filter:
      - function: regex
        # capture A–D from e.g. "Final Answer:(C)" or "Final Answer: ( C )"
        regex_pattern: '(?i)Answer[^A-D]*(?::)*[^A-D]*(?:boxed)*[^A-D]*([A-D])\b'
      - function: "take_first"
generation_kwargs:
  until:
    - "</s>"
    - "Q:"
    - "<|im_end|>"
    - "<|end_of_text|>"
  do_sample: false
  temperature: 0.0
  top_p: 1.0
should_decontaminate: true
doc_to_decontamination_query: "{{question}}"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
